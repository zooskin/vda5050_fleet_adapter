# VDA5050 Fleet Adapter Configuration
# mrceki/vda5050_fleet_adapter 형식 (Open-RMF FleetConfiguration 호환)

# FLEET CONFIG =================================================================
rmf_fleet:
  name: "vda5050_fleet"
  limits:
    linear: [0.5, 0.75]       # [velocity (m/s), acceleration (m/s²)]
    angular: [0.6, 2.0]       # [velocity (rad/s), acceleration (rad/s²)]
  profile:
    footprint: 0.3             # meters
    vicinity: 0.5              # meters
  reversible: True
  battery_system:
    voltage: 12.0              # volts
    capacity: 24.0             # Ah
    charging_current: 5.0      # A
  mechanical_system:
    mass: 20.0                 # kg
    moment_of_inertia: 10.0    # kg·m²
    friction_coefficient: 0.22
  ambient_system:
    power: 20.0                # watts
  tool_system:
    power: 0.0                 # watts
  recharge_threshold: 0.40     # 40% 이하 시 새 task 중단, 자동 충전 배정
  recharge_soc: 0.8            # 자동 충전 시 80%까지 충전 후 완료
  publish_fleet_state: 10.0
  account_for_battery_drain: False
  task_capabilities:
    loop: True
    delivery: True
    clean: False
  actions: ["teleop", "pick", "drop"]
  finishing_request: "park"
  use_parking_reservations: true
  robots:
    AGV_001:
      charger: "tinyRobot1_charger"
    AGV_002:
      charger: "tinyRobot2_charger"
  robot_state_update_frequency: 10.0
  arrival_threshold: 0.5            # meters, distance-based arrival detection
  turn_angle_threshold: 15.0       # degrees, min turn angle to require theta check
  allowed_deviation_theta: 15.0    # degrees, theta tolerance for arrival
  action_completion_delay: 0.5     # seconds, delay after reaching goal before marking action complete
  action_durations:                # seconds, override_schedule hold time per action category
    pick: 30.0
    drop: 15.0

# MQTT / VDA5050 CONFIG ========================================================
fleet_manager:
  ip: "localhost"
  prefix: "uagv/v2/RobotCompany"   # MQTT topic prefix
  port: 1883
  user: ""
  password: ""

# DOWNLOAD MAP (optional) =====================================================
download_map:
  map_id: "L1"
  map_download_url: "http://example.com/map.tar.gz"
  map_version: "2.4.1"

